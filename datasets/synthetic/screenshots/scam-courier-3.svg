  <text x="40" y="112" font-family="Segoe UI, Arial" font-size="15" fill="#111">Blue Dart: Your parcel is held at customs.</text><text x="40" y="134" font-family="Segoe UI, Arial" font-size="15" fill="#111">Pay ₹2,500 customs fee to release:</text><text x="40" y="156" font-family="Segoe UI, Arial" font-size="15" fill="#111">http://hdfc-secure.top. Failure to pay</text><text x="40" y="178" font-family="Segoe UI, Arial" font-size="15" fill="#111">within 24 hours returns the parcel.</text><text x="40" y="200" font-family="Segoe UI, Arial" font-size="15" fill="#111">Delhivery: आपका पार्सल कस्टम में रुका है।</text><text x="40" y="222" font-family="Segoe UI, Arial" font-size="15" fill="#111">₹999 शुल्क का भुगतान करें:</text><text x="40" y="244" font-family="Segoe UI, Arial" font-size="15" fill="#111">http://paytm-cashback.buzz</text>
